name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [24.x]

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

  publish:
    needs: build
    runs-on: ubuntu-latest
    if: |
      ((github.event_name == 'push' || github.event_name == 'workflow_dispatch') && github.ref == 'refs/heads/main')
      || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js 24.x
        uses: actions/setup-node@v4
        with:
          node-version: 24.x
          registry-url: 'https://registry.npmjs.org'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Resolve version and dist-tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE=$(node -p "require('./package.json').version")
            PREVIEW="${BASE}-pr.${{ github.event.pull_request.number }}.${GITHUB_SHA::7}"
            npm version "$PREVIEW" --no-git-tag-version
            echo "tag=pr-${{ github.event.pull_request.number }}" >> $GITHUB_OUTPUT
            echo "publish=true" >> $GITHUB_OUTPUT
            echo "Preview version: $PREVIEW"
          else
            CURRENT=$(node -p "require('./package.json').version")
            PUBLISHED=$(npm view @fullstackhouse/open-mercato-health version 2>/dev/null || echo "0.0.0")
            echo "tag=latest" >> $GITHUB_OUTPUT
            if [ "$CURRENT" != "$PUBLISHED" ]; then
              echo "publish=true" >> $GITHUB_OUTPUT
              echo "Release version: $CURRENT (was $PUBLISHED)"
            else
              echo "publish=false" >> $GITHUB_OUTPUT
              echo "Version unchanged at $CURRENT — skipping publish"
            fi
          fi

      - name: Publish to npm
        if: steps.resolve.outputs.publish == 'true'
        run: npm publish --provenance --access public --tag ${{ steps.resolve.outputs.tag }}
